[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  included_files = ["**/*"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Handle Next.js routing
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/next"
  status = 200

# Handle API routes specifically
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/next"
  status = 200
  force = true
